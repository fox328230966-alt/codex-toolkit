name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test on Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint (syntax check)
        run: npm run lint

      - name: Test
        run: npm test

      - name: Smoke test the CLI
        run: |
          # Make sure the bundled CLI works end-to-end with a temp CODEX_HOME
          # so we don't touch the runner's real config.
          node bin/codex-toolkit.js --help
          CODEX_HOME="$(mktemp -d)" node bin/codex-toolkit.js init
          CODEX_HOME="$(mktemp -d)" node bin/codex-toolkit.js doctor
