<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace" font-size="14">
  <!--
    Hand-authored terminal mockup. No recording tool needed.
    Shows what happens when codex-toolkit hooks intercept two common
    patterns: an out-of-scope .env write and an in-scope .ts edit.
  -->

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="0.5"/></filter>
  </defs>

  <!-- Terminal window chrome -->
  <rect x="0" y="0" width="880" height="440" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="880" height="38" rx="12" fill="#21262d"/>
  <rect x="0" y="20" width="880" height="18" fill="#21262d"/>
  <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="19" r="6" fill="#febc2e"/>
  <circle cx="66" cy="19" r="6" fill="#28c840"/>
  <text x="440" y="24" text-anchor="middle" fill="#8b949e" font-size="12">~/work/api — codex (with codex-toolkit)</text>

  <!-- Prompt line 1 -->
  <text x="20" y="74" fill="#8b949e">$</text>
  <text x="38" y="74" fill="#c9d1d9">codex "fix the off-by-one in </text>
  <text x="280" y="74" fill="#a5d6ff">src/api/handlers/auth.ts</text>
  <text x="478" y="74" fill="#c9d1d9">"</text>

  <!-- Codex thinking dot -->
  <text x="20" y="104" fill="#8b949e">  </text>
  <text x="38" y="104" fill="#58a6ff">●</text>
  <text x="56" y="104" fill="#8b949e">Reading project context</text>

  <!-- Tool call attempt: writing .env — HOOK DENIES -->
  <text x="20" y="134" fill="#8b949e">  </text>
  <text x="38" y="134" fill="#58a6ff">●</text>
  <text x="56" y="134" fill="#c9d1d9">Attempting </text>
  <text x="156" y="134" fill="#d2a8ff">write_file</text>
  <text x="232" y="134" fill="#c9d1d9">(</text>
  <text x="240" y="134" fill="#a5d6ff">.env</text>
  <text x="280" y="134" fill="#c9d1d9">)</text>

  <!-- Hook line (red) -->
  <text x="20" y="164" fill="#8b949e">  </text>
  <text x="38" y="164" fill="#f85149" font-weight="bold">[shield-env-guard]</text>
  <text x="178" y="164" fill="#c9d1d9"> deny: refused to write to "</text>
  <text x="404" y="164" fill="#a5d6ff">.env</text>
  <text x="436" y="164" fill="#c9d1d9">" — matches a sensitive path</text>

  <text x="56" y="184" fill="#8b949e">              (SSH key / .env / cloud cred / package-manager token / secrets dir)</text>

  <!-- Tool call attempt: writing the actual file — HOOK ALLOWS -->
  <text x="20" y="214" fill="#8b949e">  </text>
  <text x="38" y="214" fill="#58a6ff">●</text>
  <text x="56" y="214" fill="#c9d1d9">Attempting </text>
  <text x="156" y="214" fill="#d2a8ff">write_file</text>
  <text x="232" y="214" fill="#c9d1d9">(</text>
  <text x="240" y="214" fill="#a5d6ff">src/api/handlers/auth.ts</text>
  <text x="400" y="214" fill="#c9d1d9">)</text>

  <!-- Hook line (green) -->
  <text x="20" y="244" fill="#8b949e">  </text>
  <text x="38" y="244" fill="#3fb950" font-weight="bold">[scope-guard]</text>
  <text x="138" y="244" fill="#c9d1d9"> allow: target matches declared scope</text>

  <!-- Auto-lint post-check -->
  <text x="20" y="274" fill="#8b949e">  </text>
  <text x="38" y="274" fill="#58a6ff">●</text>
  <text x="56" y="274" fill="#c9d1d9">Running </text>
  <text x="124" y="274" fill="#d2a8ff">auto-lint</text>
  <text x="184" y="274" fill="#c9d1d9"> on </text>
  <text x="220" y="274" fill="#a5d6ff">src/api/handlers/auth.ts</text>
  <text x="380" y="274" fill="#c9d1d9"> ...</text>

  <text x="20" y="304" fill="#8b949e">  </text>
  <text x="38" y="304" fill="#3fb950" font-weight="bold">[auto-lint]</text>
  <text x="130" y="304" fill="#c9d1d9"> clean — no issues found</text>

  <!-- Result summary -->
  <text x="20" y="344" fill="#8b949e">  </text>
  <text x="38" y="344" fill="#3fb950" font-weight="bold">✓</text>
  <text x="56" y="344" fill="#c9d1d9">Diff applied. </text>
  <text x="158" y="344" fill="#f85149">1 edit refused</text>
  <text x="246" y="344" fill="#c9d1d9">, </text>
  <text x="258" y="344" fill="#3fb950">1 edit applied</text>
  <text x="338" y="344" fill="#c9d1d9">, all lint-clean.</text>

  <!-- Bottom prompt -->
  <text x="20" y="394" fill="#8b949e">$</text>
  <text x="38" y="394" fill="#c9d1d9" filter="url(#glow)">█</text>

  <!-- Subtle attribution -->
  <text x="20" y="424" fill="#6e7681" font-size="11">codex-toolkit v0.4.0 — scope-guard · shield-env-guard · auto-lint</text>
</svg>
