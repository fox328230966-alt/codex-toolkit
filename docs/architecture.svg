<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace" font-size="13">
  <!--
    Architecture: where each codex-toolkit hook sits in the Codex CLI
    lifecycle, what it consumes, what it returns.

    Codex flow (top to bottom):
      user prompt
        -> model decides next action
          -> tool call (Write/Edit/Shell/...)
            -> hook fires (PreToolUse)  <- codex-toolkit's 4 hooks live here
            -> tool executes
            -> hook fires (PostToolUse) <- codex-toolkit's 2 hooks live here
          -> model reads tool result
        -> ... loop until model returns
      final answer
  -->

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f85149"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="540" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="20" y="32" fill="#c9d1d9" font-size="18" font-weight="bold">codex-toolkit — hook placement in the Codex CLI lifecycle</text>
  <text x="20" y="52" fill="#8b949e" font-size="12">Six hooks. Two trigger points. Zero runtime dependencies.</text>

  <!-- Lifecycle column -->
  <text x="50" y="92" fill="#8b949e" text-anchor="middle" font-size="11">USER</text>
  <rect x="20" y="100" width="120" height="48" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="80" y="124" text-anchor="middle" fill="#c9d1d9" font-size="12">prompt</text>
  <text x="80" y="140" text-anchor="middle" fill="#8b949e" font-size="10">"fix auth.ts"</text>

  <text x="220" y="92" fill="#8b949e" text-anchor="middle" font-size="11">MODEL</text>
  <rect x="170" y="100" width="170" height="48" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="255" y="124" text-anchor="middle" fill="#c9d1d9" font-size="12">plan + decide</text>
  <text x="255" y="140" text-anchor="middle" fill="#8b949e" font-size="10">next tool call</text>

  <text x="425" y="92" fill="#8b949e" text-anchor="middle" font-size="11">HOOK: PreToolUse</text>
  <rect x="340" y="100" width="170" height="48" rx="6" fill="#1f2d20" stroke="#3fb950"/>
  <text x="425" y="124" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">codex-toolkit</text>
  <text x="425" y="140" text-anchor="middle" fill="#8b949e" font-size="10">4 hooks fire</text>

  <text x="600" y="92" fill="#8b949e" text-anchor="middle" font-size="11">EXEC</text>
  <rect x="555" y="100" width="120" height="48" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="615" y="124" text-anchor="middle" fill="#c9d1d9" font-size="12">tool</text>
  <text x="615" y="140" text-anchor="middle" fill="#8b949e" font-size="10">file/shell/...</text>

  <text x="780" y="92" fill="#8b949e" text-anchor="middle" font-size="11">HOOK: PostToolUse</text>
  <rect x="730" y="100" width="170" height="48" rx="6" fill="#1f2d20" stroke="#3fb950"/>
  <text x="815" y="124" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">codex-toolkit</text>
  <text x="815" y="140" text-anchor="middle" fill="#8b949e" font-size="10">2 hooks fire</text>

  <!-- Arrows: prompt -> model -> PreHook -> exec -->
  <line x1="140" y1="124" x2="170" y2="124" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="340" y1="124" x2="555" y2="124" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="675" y1="124" x2="730" y2="124" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="900" y1="124" x2="900" y2="170" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="615" y1="170" x2="615" y2="124" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PreToolUse hooks box -->
  <text x="50" y="220" fill="#8b949e" font-size="11">PRE-TOOL-USE HOOKS</text>
  <rect x="20" y="230" width="180" height="60" rx="6" fill="#0d1117" stroke="#3fb950"/>
  <text x="32" y="252" fill="#3fb950" font-size="12" font-weight="bold">scope-guard</text>
  <text x="32" y="272" fill="#8b949e" font-size="10">is the file in declared scope?</text>

  <rect x="210" y="230" width="180" height="60" rx="6" fill="#0d1117" stroke="#3fb950"/>
  <text x="222" y="252" fill="#3fb950" font-size="12" font-weight="bold">tool-pace-check</text>
  <text x="222" y="272" fill="#8b949e" font-size="10">too many calls in 60s?</text>

  <rect x="400" y="230" width="180" height="60" rx="6" fill="#0d1117" stroke="#3fb950"/>
  <text x="412" y="252" fill="#3fb950" font-size="12" font-weight="bold">shield-destructive-cmd</text>
  <text x="412" y="272" fill="#8b949e" font-size="10">rm -rf /, force push, drop table?</text>

  <rect x="590" y="230" width="180" height="60" rx="6" fill="#0d1117" stroke="#3fb950"/>
  <text x="602" y="252" fill="#3fb950" font-size="12" font-weight="bold">shield-env-guard</text>
  <text x="602" y="272" fill="#8b949e" font-size="10">.env / SSH keys / cloud creds?</text>

  <!-- PostToolUse hooks box -->
  <text x="50" y="330" fill="#8b949e" font-size="11">POST-TOOL-USE HOOKS</text>
  <rect x="20" y="340" width="180" height="60" rx="6" fill="#0d1117" stroke="#d2a8ff"/>
  <text x="32" y="362" fill="#d2a8ff" font-size="12" font-weight="bold">diff-budget</text>
  <text x="32" y="382" fill="#8b949e" font-size="10">task-wide file/byte cap</text>

  <rect x="210" y="340" width="180" height="60" rx="6" fill="#0d1117" stroke="#d2a8ff"/>
  <text x="222" y="362" fill="#d2a8ff" font-size="12" font-weight="bold">auto-lint</text>
  <text x="222" y="382" fill="#8b949e" font-size="10">go fmt / ruff / eslint / rustfmt</text>

  <!-- Decision return -->
  <text x="50" y="438" fill="#8b949e" font-size="11">DECISION PROTOCOL</text>
  <rect x="20" y="450" width="380" height="36" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="32" y="473" fill="#c9d1d9" font-size="11">stdout JSON: </text>
  <text x="138" y="473" fill="#3fb950" font-size="11" font-weight="bold">{ "decision": "allow" | "ask" | "deny", "reason": "..." }</text>

  <rect x="420" y="450" width="160" height="36" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="432" y="473" fill="#c9d1d9" font-size="11">exit 0 = allow/ask</text>

  <rect x="600" y="450" width="160" height="36" rx="6" fill="#0d1117" stroke="#f85149"/>
  <text x="612" y="473" fill="#f85149" font-size="11">exit 2 = deny + stderr</text>

  <!-- Storage -->
  <text x="50" y="510" fill="#8b949e" font-size="11">PERSISTENT STATE</text>
  <rect x="20" y="520" width="380" height="14" rx="3" fill="#0d1117" stroke="#30363d"/>
  <text x="32" y="531" fill="#8b949e" font-size="10">~/.codex/hooks/ + .codex-toolkit/</text>
  <text x="800" y="531" fill="#8b949e" font-size="10" text-anchor="end">state-store.js — atomic JSON files</text>
</svg>
